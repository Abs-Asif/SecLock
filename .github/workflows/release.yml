name: Release

on:
  push:
    branches:
      - 'main'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Project checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'gradle'
      - name: Signing key
        env:
          KEY_STORE: ${{ secrets.KEY_STORE }}
        run: |
          if [ -n "$KEY_STORE" ]; then
            echo "Using production signing key from secrets."
            echo 'androidStorePassword=${{ secrets.KEY_STORE_PASSWORD }}' >> local.properties
            echo 'androidKeyAlias=${{ secrets.ALIAS }}' >> local.properties
            echo 'androidKeyPassword=${{ secrets.KEY_PASSWORD }}' >> local.properties
            echo 'androidStoreFile=sign_key.jks' >> local.properties
            echo "$KEY_STORE" | base64 --decode > sign_key.jks
          else
            echo "KEY_STORE secret is empty/missing. Falling back to the dummy signing key."
            echo 'androidStorePassword=dummypassword' >> local.properties
            echo 'androidKeyAlias=dummyalias' >> local.properties
            echo 'androidKeyPassword=dummypassword' >> local.properties
            echo 'androidStoreFile=sign_key.jks' >> local.properties
          fi
          # Validate the keystore file
          if [ ! -f sign_key.jks ] || [ ! -s sign_key.jks ]; then
            echo "ERROR: Keystore file is missing or empty"
            exit 1
          fi
          file sign_key.jks
          # Verify keystore is readable by Java
          if [ -n "$KEY_STORE" ]; then
            keytool -list -v -keystore sign_key.jks -storepass "${{ secrets.KEY_STORE_PASSWORD }}"
          else
            keytool -list -v -keystore sign_key.jks -storepass "dummypassword"
          fi
      - name: Build
        id: build
        run: |
          echo 'org.gradle.caching=true' >> gradle.properties
          echo 'org.gradle.parallel=true' >> gradle.properties
          echo 'org.gradle.vfs.watch=true' >> gradle.properties
          echo 'org.gradle.jvmargs=-Xmx2048m' >> gradle.properties
          ./gradlew :app:assembleRelease
      - name: Upload mappings
        uses: actions/upload-artifact@v7
        with:
          name: mappings
          path: "app/build/outputs/mapping/release"
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "app/build/outputs/apk/release/app-release.apk"
          draft: false
          tag: "${{ steps.date.outputs.date }}"
          name: "SecLock ${{ steps.date.outputs.date }}"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
